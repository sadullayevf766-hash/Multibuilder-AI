services:
  - type: web
    name: floorplan-ai
    env: node
    region: oregon
    plan: free
    buildCommand: "npm install --prefix client --legacy-peer-deps && npm install --prefix server && client/node_modules/.bin/vite build --root client --outDir dist && npm run build --workspace=server"
    startCommand: node server/dist/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
