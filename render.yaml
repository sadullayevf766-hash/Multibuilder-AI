services:
  - type: web
    name: floorplan-ai
    env: node
    region: oregon
    plan: free
    buildCommand: "NODE_ENV=development npm install --prefix client --legacy-peer-deps && NODE_ENV=development npm install --prefix server && (cd client && node_modules/.bin/vite build) && npm run build --workspace=server"
    startCommand: node server/dist/server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_YEARLY
        sync: false
      - key: STRIPE_PRICE_BIZ_MONTHLY
        sync: false
      - key: STRIPE_PRICE_BIZ_YEARLY
        sync: false
      - key: APP_URL
        value: https://multibuilder-ai.onrender.com
